name: Build & Release Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Node.js portable
        run: |
          $nodeVersion = "v20.18.1"
          $url = "https://nodejs.org/dist/$nodeVersion/node-$nodeVersion-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node.zip -UseBasicParsing
          Expand-Archive node.zip -DestinationPath temp-node
          New-Item -ItemType Directory -Path installer-dist/node -Force | Out-Null
          Copy-Item temp-node/node-$nodeVersion-win-x64/* installer-dist/node/ -Recurse

      - name: Assemble installer zip
        run: |
          # ps1 を UTF-8 BOM 付きでコピー（Windows PowerShell 5.1 互換のため）
          $content = [System.IO.File]::ReadAllText("install-addin.ps1")
          $bomEncoding = [System.Text.UTF8Encoding]::new($true)
          [System.IO.File]::WriteAllText("installer-dist/install-addin.ps1", $content, $bomEncoding)
          Copy-Item install.bat installer-dist/
          Compress-Archive -Path installer-dist/* -DestinationPath union-mail-addin-installer.zip

      - name: List contents
        run: |
          Get-ChildItem installer-dist -Recurse | Select-Object FullName
          (Get-Item union-mail-addin-installer.zip).Length / 1MB

      - name: Upload to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "最新インストーラー"
          body: |
            ## 組合メール転送アドイン インストーラー

            ### 使い方
            1. `union-mail-addin-installer.zip` をダウンロードして展開
            2. `install.bat` をダブルクリック
            3. Microsoft 365 にサインイン
            4. Outlook を再起動

            > 管理者権限不要・Node.js のインストール不要
          files: union-mail-addin-installer.zip
          make_latest: true
