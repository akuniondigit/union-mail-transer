name: Build & Release Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Assemble installer zip
        run: |
          New-Item -ItemType Directory -Path installer-dist -Force | Out-Null
          # ps1 を UTF-8 BOM 付きでコピー（Windows PowerShell 5.1 互換のため）
          $content = [System.IO.File]::ReadAllText("install-addin.ps1")
          $bomEncoding = [System.Text.UTF8Encoding]::new($true)
          [System.IO.File]::WriteAllText("installer-dist/install-addin.ps1", $content, $bomEncoding)
          Copy-Item install.bat installer-dist/
          Compress-Archive -Path installer-dist/* -DestinationPath union-mail-addin-installer.zip

      - name: List contents
        run: |
          Get-ChildItem installer-dist | Format-Table Name, Length

      - name: Upload to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "最新インストーラー"
          body: |
            ## 組合メール転送アドイン インストーラー

            ### 使い方
            1. `union-mail-addin-installer.zip` をダウンロードして展開
            2. `install.bat` をダブルクリック
            3. ブラウザが開いたら Microsoft 365 にサインイン
            4. Outlook を再起動

            > 管理者権限不要（Node.js は自動でダウンロード・使用後に削除されます）
          files: union-mail-addin-installer.zip
          make_latest: true
