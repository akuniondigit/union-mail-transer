name: Build & Release Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install installer dependencies
        working-directory: installer
        run: npm ci

      - name: Build standalone exe
        working-directory: installer
        run: npm run build

      - name: List dist contents
        working-directory: installer
        run: Get-ChildItem dist

      - name: Upload to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "最新インストーラー"
          body: |
            ## 組合メール転送アドイン インストーラー

            ### 使い方
            1. `install-addin.exe` をダウンロードしてダブルクリック
            2. 「何かキーを押すと終了します」が出たら任意のキーを押す
            3. Outlook を再起動

            > Node.js・認証・管理者権限 すべて不要
          files: installer/dist/install-addin.exe
          make_latest: true
